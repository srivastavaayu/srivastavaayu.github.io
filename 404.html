<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <meta name="theme-color" content="#0a0a0f" />

    <title>404 — Page Not Found · Aayush Srivastava</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap&font-display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap&font-display=swap"
      media="print"
      onload="this.media = 'all'"
    />
    <noscript
      ><link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap"
    /></noscript>

    <link rel="stylesheet" href="css/tokens.css" />
    <link rel="stylesheet" href="css/style.css" />

    <script>
      (function () {
        try {
          var t = localStorage.getItem("as-theme");
          if (t) document.documentElement.setAttribute("data-theme", t);
        } catch (e) {}
      })();
    </script>

    <script>document.documentElement.classList.add('js-ready');</script>

    <link rel="icon" href="images/aayush.jpg" />

    <style>
      .error-page {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: var(--space-8);
        position: relative;
        overflow: hidden;
      }

      .error-page::before {
        content: "404";
        position: absolute;
        font-size: clamp(160px, 30vw, 320px);
        font-weight: var(--weight-black);
        color: var(--border-subtle);
        letter-spacing: var(--tracking-tight);
        line-height: 1;
        user-select: none;
        pointer-events: none;
        font-family: var(--font-mono);
      }

      .error-content {
        position: relative;
        z-index: 1;
        max-width: 480px;
      }

      .error-eyebrow {
        font-family: var(--font-mono);
        font-size: var(--text-xs);
        font-weight: var(--weight-semibold);
        color: var(--accent-light);
        letter-spacing: var(--tracking-wider);
        text-transform: uppercase;
        margin-bottom: var(--space-4);
      }

      .error-title {
        font-size: var(--text-3xl);
        font-weight: var(--weight-black);
        letter-spacing: var(--tracking-tight);
        color: var(--text-primary);
        margin-bottom: var(--space-4);
      }

      .error-description {
        font-size: var(--text-base);
        color: var(--text-secondary);
        line-height: var(--leading-loose);
        margin-bottom: var(--space-8);
      }

      .error-actions {
        display: flex;
        gap: var(--space-3);
        justify-content: center;
        flex-wrap: wrap;
      }
    </style>
  </head>
  <body>
    <div class="scroll-progress" id="scroll-progress" aria-hidden="true"></div>
    <div class="spotlight" id="spotlight" aria-hidden="true"></div>
    <a href="#main-content" class="skip-link">Skip to content</a>

    <!-- ===================== NAV ===================== -->

        <div class="nav-links" role="list">

          <a href="work.html" class="nav-link" role="listitem">Work</a>

          <a href="contact.html" class="nav-link" role="listitem">Contact</a>
        </div>
        <div class="nav-actions">
          <button class="theme-toggle" aria-label="Toggle light/dark theme" title="Toggle light/dark theme">
            <svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
            </svg>
            <svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <circle cx="12" cy="12" r="5" />
              <line x1="12" y1="1" x2="12" y2="3" />
              <line x1="12" y1="21" x2="12" y2="23" />
              <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
              <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
              <line x1="1" y1="12" x2="3" y2="12" />
              <line x1="21" y1="12" x2="23" y2="12" />
              <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
              <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
            </svg>
          </button>
          <a href="work.html#resume-download" class="btn-nav-cta">Download Résumé</a>
          <button class="nav-mobile-toggle" aria-label="Open navigation menu">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <line x1="3" y1="6" x2="21" y2="6" />
              <line x1="3" y1="12" x2="21" y2="12" />
              <line x1="3" y1="18" x2="21" y2="18" />
            </svg>
          </button>
        </div>
      </div>
    </nav>
    <nav class="nav-mobile-menu" aria-label="Mobile navigation">
      <a href="index.html" class="nav-mobile-link">Home</a>
      <a href="work.html" class="nav-mobile-link">Work</a>
      <a href="projects.html" class="nav-mobile-link">Projects</a>
      <a href="contact.html" class="nav-mobile-link">Contact</a>
      <a href="work.html#resume-download" class="nav-mobile-cta">Download Résumé</a>
    </nav>

    <main id="main-content" class="error-page" role="main">
      <div class="error-content animate-fade-up">
        <p class="error-eyebrow">Error 404</p>
        <h1 class="error-title">Page not found.</h1>
        <p class="error-description">
          This page seems to have gone missing — or maybe it never existed.
          Let's get you back somewhere familiar.
        </p>
        <div class="error-actions">
          <a href="index.html" class="btn btn-primary">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              aria-hidden="true"
            >
              <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
              <polyline points="9 22 9 12 15 12 15 22" />
            </svg>
            Go Home
          </a>
          <a href="contact.html" class="btn btn-secondary"> Get in Touch </a>
        </div>
      </div>
    </main>

    <script src="js/main.js"></script>
  </body>
</html>
